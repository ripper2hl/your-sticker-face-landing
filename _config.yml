# ====================================================
# Feature List
# ====================================================
features:

  - title: Detección automática de rostros
    description: Selecciona una foto y la IA identifica las caras al instante. Sin editar a mano.
    fontawesome_icon_name: robot

  - title: 100% offline
    description: Todo el procesamiento ocurre localmente en tu dispositivo. Sin servidores, sin cuentas, sin subir fotos.
    fontawesome_icon_name: wifi-slash

  - title: Memoria de rostros
    description: Activa el reconocimiento de personas para que la app recuerde a tus contactos y les asigne siempre el mismo sticker.
    fontawesome_icon_name: user-friends

  - title: Rostros desconocidos cubiertos
    description: Las personas no registradas reciben stickers aleatorios, ideal para fotos en lugares públicos.
    fontawesome_icon_name: dice

  - title: Elimina metadatos EXIF
    description: Al exportar se borran datos como ubicación GPS, fecha y modelo del dispositivo.
    fontawesome_icon_name: broom

  - title: Compartir rápido
    description: Guarda o comparte la imagen final directamente desde Android en segundos.
    fontawesome_icon_name: share-alt


